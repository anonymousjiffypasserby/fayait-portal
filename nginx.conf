server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so browsers always get the latest bundle hash
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri /index.html;
    }
}
